<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<title>Bemon Coffee POS</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-wrap">
  <div style="text-align:center;margin-bottom:24px">
    <img src="logo.jpg" class="login-logo" style="border-radius:50%;object-fit:cover"/>
    <div class="login-brand">Bemon Coffee</div>
    <div class="login-sub">QUẢN LÝ BÁN HÀNG</div>
  </div>
  <div class="login-card">
    <div style="font-weight:900;font-size:18px;text-align:center;margin-bottom:20px;color:var(--text)">Đăng nhập</div>
    <div class="fg"><label class="fl">Tên đăng nhập</label><input class="fi" id="lu" type="text" placeholder="bemoncoffee0509" autocomplete="username" autocapitalize="none" autocorrect="off"/></div>
    <div class="fg"><label class="fl">Mật khẩu</label>
      <div class="pass-wrap"><input class="fi fi-pass" id="lp" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="pass-eye" onclick="togglePW()" id="peye">👁️</button></div>
    </div>
    <div class="login-err" id="lerr"></div>
    <button class="btn btn-pr btn-full" id="lbtn" onclick="doLogin()" style="font-size:16px;padding:14px;border-radius:14px">🔓 Đăng nhập</button>
  </div>
  <div style="text-align:center;margin-top:18px;font-size:11px;color:#c8bfb0">Bemon Coffee POS · 171 Trương Định</div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div id="header">
    <div style="display:flex;align-items:center;gap:9px">
      <img src="logo.jpg" style="width:34px;height:34px;flex-shrink:0;border-radius:50%;object-fit:cover"/>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:17px;color:var(--brown);line-height:1">Bemon Coffee</div>
        <div style="font-size:9px;color:var(--sub);letter-spacing:1.5px;margin-top:2px">171 TRƯƠNG ĐỊNH</div>
      </div>
    </div>
    <div id="hdr-actions" style="display:flex;gap:7px;align-items:center"></div>
  </div>

  <div id="content-area">
    <!-- ORDER -->
    <div class="page active fade-in" id="page-order">
      <div class="chip-row" id="cat-chips"></div>
      <div class="mgrid" id="menu-grid"></div>
    </div>
    <!-- REPORT -->
    <div class="page" id="page-report"></div>
    <!-- INVOICES -->
    <div class="page" id="page-invoices"></div>
    <!-- PRODUCTS -->
    <div class="page" id="page-products"></div>

    <!-- INVENTORY -->
    <div class="page" id="page-inventory">
      <div class="inv-sub-bar" id="inv-sub-bar">
        <button class="ist on" onclick="setInvTab('items')">📋 Mặt hàng</button>
        <button class="ist" onclick="setInvTab('ingredients')">🧪 Nguyên liệu</button>
        <button class="ist" onclick="setInvTab('purchase')">🚚 Nhập hàng</button>
        <button class="ist" onclick="setInvTab('void')">🗑️ Huỷ hàng</button>
      </div>
      <div class="inv-page-body">
        <div class="inv-sub on" id="isub-items"></div>
        <div class="inv-sub" id="isub-ingredients"></div>
        <div class="inv-sub" id="isub-purchase"></div>
        <div class="inv-sub" id="isub-void"></div>
      </div>
    </div>
  </div>

  <div id="bottom-nav">
    <button class="nb on" onclick="goTab('order')"><span class="ni">🛒</span><span class="nl">Bán hàng</span><div class="nd"></div></button>
    <button class="nb" onclick="goTab('report')"><span class="ni">📊</span><span class="nl">Báo cáo</span><div class="nd"></div></button>
    <button class="nb" onclick="goTab('products')"><span class="ni">🏆</span><span class="nl">Sản phẩm</span><div class="nd"></div></button>
    <button class="nb" onclick="goTab('invoices')"><span class="ni">🧾</span><span class="nl">Hoá đơn</span><div class="nd"></div></button>
    <button class="nb" onclick="goTab('inventory')"><span class="ni">📦</span><span class="nl">Kho</span><div class="nd"></div></button>
  </div>
</div>

<div id="toast"></div>

<!-- ── SHEETS ── -->
<div class="overlay" id="ov-cart">
  <div class="ov-bg" onclick="closeOv('ov-cart')"></div>
  <div class="sh-body">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title" id="cart-title">🛒 Giỏ hàng</div><button class="sh-close" onclick="closeOv('ov-cart')">✕</button></div>
    <div class="sh-content" id="cart-body"></div>
  </div>
</div>

<div class="overlay" id="ov-pay">
  <div class="ov-bg" onclick="closeOv('ov-pay')"></div>
  <div class="sh-body" style="max-height:78vh">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title">💳 Thanh toán</div><button class="sh-close" onclick="closeOv('ov-pay')">✕</button></div>
    <div class="sh-content" id="pay-body"></div>
  </div>
</div>

<div class="overlay" id="ov-inv">
  <div class="ov-bg" onclick="closeOv('ov-inv')"></div>
  <div class="sh-body" style="max-height:93dvh;overflow:hidden;display:flex;flex-direction:column">
    <div class="sh-handle"></div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0" id="inv-body"></div>
    <div id="inv-foot" style="display:flex;gap:10px;padding:12px 20px;padding-bottom:calc(env(safe-area-inset-bottom,0px)+12px);border-top:1px solid #f0e8dc;background:#fff;flex-shrink:0"></div>
  </div>
</div>

<!-- form modals -->
<div class="overlay fm" id="ov-item-form">
  <div class="ov-bg" onclick="closeOv('ov-item-form')"></div>
  <div class="sh-body">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title" id="item-form-title">➕ Thêm mặt hàng</div><button class="sh-close" onclick="closeOv('ov-item-form')">✕</button></div>
    <div class="sh-content" id="item-form-body"></div>
  </div>
</div>

<div class="overlay fm" id="ov-ing-form">
  <div class="ov-bg" onclick="closeOv('ov-ing-form')"></div>
  <div class="sh-body">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title" id="ing-form-title">➕ Thêm nguyên liệu</div><button class="sh-close" onclick="closeOv('ov-ing-form')">✕</button></div>
    <div class="sh-content" id="ing-form-body"></div>
  </div>
</div>

<div class="overlay fm" id="ov-purch-form">
  <div class="ov-bg" onclick="closeOv('ov-purch-form')"></div>
  <div class="sh-body">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title">🚚 Tạo phiếu nhập hàng</div><button class="sh-close" onclick="closeOv('ov-purch-form')">✕</button></div>
    <div class="sh-content" id="purch-form-body"></div>
  </div>
</div>

<div class="overlay fm" id="ov-void-form">
  <div class="ov-bg" onclick="closeOv('ov-void-form')"></div>
  <div class="sh-body">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title">🗑️ Tạo phiếu huỷ hàng</div><button class="sh-close" onclick="closeOv('ov-void-form')">✕</button></div>
    <div class="sh-content" id="void-form-body"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
